<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mess Master</title>
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { width: 95%; padding: 10px; background: #38bdf8; border: none; border-radius: 5px; cursor: pointer; color: #000; font-weight: bold; }
        #display { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mess Master</h1>
    <input type="text" id="entry" placeholder="Entry likhein...">
    <button id="saveBtn">Save Entry</button>
    <div id="display"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    // --- YAHAN APNA CONFIG PASTE KAREIN ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };
    // --------------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const entriesRef = ref(db, 'entries');

    document.getElementById("saveBtn").onclick = function() {
        let val = document.getElementById("entry").value;
        if(val) {
            push(entriesRef, val);
            document.getElementById("entry").value = "";
        }
    };

    onValue(entriesRef, (snapshot) => {
        const data = snapshot.val();
        const display = document.getElementById("display");
        display.innerHTML = "";
        if (data) {
            Object.values(data).forEach(item => {
                display.innerHTML += `<p>• ${item}</p>`;
            });
        }
    });
</script>

</body>
</html>
